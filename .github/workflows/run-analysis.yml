name: Run OSS Analysis

on:
  workflow_dispatch:
    inputs:
      repo_url:
        description: 'GitHub repo URL to analyze (e.g. https://github.com/redis/redis)'
        required: true
        type: string
      output_path:
        description: 'Output folder under open-source-breakdowns/ (e.g. redis)'
        required: true
        type: string
  schedule:
    # Weekly full refresh of tracked repos — Sundays at 02:00 UTC
    - cron: '0 2 * * 0'

jobs:
  analyze:
    runs-on: ubuntu-latest
    permissions:
